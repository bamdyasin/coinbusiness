<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Smart Business</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="../index.html">🚀 Smart Business Shop</a>
    <a href="../index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
      <i class="bi bi-arrow-left"></i> হোমে ফিরুন
    </a>
  </div>
</nav>

<div class="shop-container">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-white">আমাদের শপ</h2>
            <p class="text-white-50">আপনার পছন্দের গেম টপ-আপ এবং সার্ভিস বেছে নিন</p>
        </div>

        <div class="row g-4 justify-content-center">
            <!-- TikTok -->
            <div class="col-6 col-md-3">
                <a href="../payment/payment.html" class="text-decoration-none">
                    <div class="shop-card tiktok">
                        <div class="card-icon">
                            <i class="bi bi-tiktok"></i>
                        </div>
                        <h5>TikTok</h5>
                        <p>Coins & Follower</p>
                        <button class="btn btn-shop">অর্ডার করুন</button>
                    </div>
                </a>
            </div>

            <!-- PUBG -->
            <div class="col-6 col-md-3">
                <div class="shop-card pubg coming-soon">
                    <div class="card-icon">
                        <i class="bi bi-controller"></i>
                    </div>
                    <h5>PUBG</h5>
                    <p>UC Top-up</p>
                    <button class="btn btn-shop disabled">Coming Soon</button>
                </div>
            </div>

            <!-- Free Fire -->
            <div class="col-6 col-md-3">
                <div class="shop-card freefire coming-soon">
                    <div class="card-icon">
                        <i class="bi bi-fire"></i>
                    </div>
                    <h5>Free Fire</h5>
                    <p>Diamond Top-up</p>
                    <button class="btn btn-shop disabled">Coming Soon</button>
                </div>
            </div>

            <!-- Call of Duty -->
            <div class="col-6 col-md-3">
                <div class="shop-card cod coming-soon">
                    <div class="card-icon">
                        <i class="bi bi-shield-shaded"></i>
                    </div>
                    <h5>Call of Duty</h5>
                    <p>CP Top-up</p>
                    <button class="btn btn-shop disabled">Coming Soon</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-auto py-3">
  <div class="container text-center">
    <span class="text-white-50">© 2026 Smart Business Shop. All Rights Reserved.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
